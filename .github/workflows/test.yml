name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  broker:
    name: broker (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: broker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: broker/pyproject.toml
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff lint
        run: ruff check .
      - name: pytest
        run: pytest -v

  orchestrator:
    name: orchestrator (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff lint
        run: ruff check .
      - name: pytest
        run: pytest -v

  terraform:
    name: terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
      - name: fmt -check
        run: terraform fmt -check -recursive
      - name: init (no backend)
        run: terraform init -backend=false
      - name: validate
        run: terraform validate
